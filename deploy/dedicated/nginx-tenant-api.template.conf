# ═══════════════════════════════════════════════════════════════════════
# Tier A — Dedicated cloud tenant API vhost template
# Rendered by scripts/provision-dedicated.sh — placeholders replaced:
#   __SLUG__   → tenant slug (lowercase, alphanumeric)
#   __PORT__   → assigned PM2 listen port (5100-5199 range)
# Final filename on VPS:
#   /etc/nginx/sites-available/__SLUG__-api.agencybook.net.conf
#
# Note: frontend is served by the existing wildcard *.agencybook.net vhost
#       at /home/agencybook/frontend/dist — no per-tenant frontend vhost needed.
# ═══════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name __SLUG__-api.agencybook.net;

    # ACME challenge for Let's Encrypt — must precede any catch-all
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Request size limit (uploads — passport scans, certificates, Excel)
    client_max_body_size 20M;

    # Uploads served directly by Nginx — bypass Node for static files
    location /uploads/ {
        alias /home/agencybook/instances/__SLUG__/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API proxy → tenant's PM2 process
    location / {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;

        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         'upgrade';
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    access_log /home/agencybook/logs/nginx/__SLUG__-api.access.log;
    error_log  /home/agencybook/logs/nginx/__SLUG__-api.error.log;
}
