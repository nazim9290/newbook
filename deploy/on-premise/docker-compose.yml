# ═══════════════════════════════════════════════════════════════════════
# Phase 14 (skeleton): Tier C On-Premise Docker Compose
# ═══════════════════════════════════════════════════════════════════════
#
# Status: REFERENCE/SKELETON — not production-ready until first signed
# enterprise contract triggers full Phase 14 implementation.
#
# What's here: minimal viable stack so the architecture is testable.
# What's missing (build when needed):
#   - bytenode obfuscation in Dockerfile
#   - Cosign image signing in CI
#   - license-agent's full hardware fingerprinting + JWT validation
#   - FRP tunnel for support access
#   - GPG-encrypted backup container
#
# Customer one-line install (when ready):
#   curl https://install.agencybook.net/onprem | bash -s LICENSE_KEY DOMAIN
# ═══════════════════════════════════════════════════════════════════════

version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: agencyos_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks: [agencyos_net]

  frontend:
    image: ghcr.io/agencyos/frontend:${VERSION:-latest}
    container_name: agencyos_frontend
    restart: always
    networks: [agencyos_net]

  backend:
    image: ghcr.io/agencyos/backend:${VERSION:-latest}
    container_name: agencyos_backend
    restart: always
    environment:
      NODE_ENV: production
      DEPLOYMENT_MODE: on-premise
      INSTANCE_ID: ${INSTANCE_ID}
      LICENSE_KEY: ${LICENSE_KEY}
      LICENSE_STRICT: "true"
      DATABASE_URL: postgresql://app:${DB_PASS}@postgres:5432/agencyos
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CENTRAL_API_URL: https://api-central.agencybook.net
      OPS_HEARTBEAT_URL: https://demo-api.agencybook.net/api/ops/heartbeat
      UPDATE_SERVER_URL: https://updates.agencybook.net/v1/manifest.json
    volumes:
      - ./uploads:/app/uploads
      - ./logs/backend:/app/logs
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    networks: [agencyos_net]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: agencyos_postgres
    restart: always
    environment:
      POSTGRES_DB: agencyos
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d agencyos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [agencyos_net]

  redis:
    image: redis:7-alpine
    container_name: agencyos_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASS}
    volumes:
      - redis_data:/data
    networks: [agencyos_net]

  license-agent:
    image: ghcr.io/agencyos/license-agent:${VERSION:-latest}
    container_name: agencyos_license
    restart: always
    environment:
      LICENSE_KEY: ${LICENSE_KEY}
      LICENSE_SERVER: https://license.agencybook.net
      INSTANCE_ID: ${INSTANCE_ID}
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379
    volumes:
      - ./logs/license:/app/logs
    networks: [agencyos_net]

  backup:
    image: ghcr.io/agencyos/backup:${VERSION:-latest}
    container_name: agencyos_backup
    restart: always
    environment:
      BACKUP_SCHEDULE: "0 2 * * *"
      GPG_RECIPIENT: ${CLIENT_GPG_KEY}
      DB_HOST: postgres
      DB_NAME: agencyos
      DB_USER: app
      DB_PASS: ${DB_PASS}
      OFFSITE_ENABLED: ${OFFSITE_ENABLED:-false}
      OFFSITE_PROVIDER: ${OFFSITE_PROVIDER:-}
      OFFSITE_BUCKET: ${OFFSITE_BUCKET:-}
    volumes:
      - ./backups:/backups
      - ./config/gpg:/root/.gnupg
    depends_on: [postgres]
    networks: [agencyos_net]

volumes:
  postgres_data:
  redis_data:

networks:
  agencyos_net:
    driver: bridge
